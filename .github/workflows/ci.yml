name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libopencv-dev libeigen3-dev clang-format python3-matplotlib python3-pandas
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Star tracker smoke test
        run: |
          python3 scripts/generate_star_tracker_case.py --output-dir outputs/star_tracker_smoke --noise-px 0.1 --stars 12
          build/apps/star_tracker_attitude --catalog outputs/star_tracker_smoke/catalog.csv --observations outputs/star_tracker_smoke/observations.csv --fx 1000 --fy 1000 --cx 512 --cy 512
      - name: Lost-in-space C++ vs Python bit-exact smoke
        run: |
          set -euo pipefail
          fixture=outputs/lost_in_space_smoke
          mkdir -p "$fixture"
          python3 scripts/generate_star_tracker_case.py \
            --output-dir "$fixture" --noise-px 0.1 --stars 12 --seed 17
          awk -F',' 'NR==1{print "u,v"; next} {print $2","$3}' \
            "$fixture/observations.csv" > "$fixture/observations_unlabeled.csv"
          python3 scripts/build_star_pair_index.py \
            --catalog "$fixture/catalog.csv" \
            --output "$fixture/pair_index.pkl" \
            --write-bin --skip-pkl \
            --bin-arcsec 120 --min-edge-deg 0.2 --max-edge-deg 80
          build/apps/build_star_pair_index \
            --catalog "$fixture/catalog.csv" \
            --output "$fixture/pair_index_cpp.bin" \
            --bin-arcsec 120 --min-edge-deg 0.2 --max-edge-deg 80
          cmp "$fixture/pair_index.bin" "$fixture/pair_index_cpp.bin"
          python3 scripts/identify_stars_with_pair_index.py \
            --observations "$fixture/observations_unlabeled.csv" \
            --index "$fixture/pair_index.npz" \
            --output "$fixture/py_assignments.csv" \
            --fx 1000 --fy 1000 --cx 512 --cy 512 \
            --tolerance-arcsec 300 --neighbor-bins 2 \
            --verification-tolerance-arcsec 600 --magnitude-prior-arcsec 15 \
            --max-observation-triangles 400 \
            --max-candidates-per-observation-triangle 8 \
            --max-verified-hypotheses 400
          build/apps/lost_in_space_pair_id \
            --observations "$fixture/observations_unlabeled.csv" \
            --index "$fixture/pair_index.bin" \
            --output "$fixture/cpp_assignments.csv" \
            --fx 1000 --fy 1000 --cx 512 --cy 512 \
            --tolerance-arcsec 300 --neighbor-bins 2 \
            --verification-tolerance-arcsec 600 --magnitude-prior-arcsec 15 \
            --max-observation-triangles 400 \
            --max-candidates-per-observation-triangle 8 \
            --max-verified-hypotheses 400
          cmp "$fixture/py_assignments.csv" "$fixture/cpp_assignments.csv"
      - name: Format check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
            if ! git rev-parse --verify "$base" >/dev/null 2>&1; then
              base="HEAD^"
            fi
          fi
          changed_cpp="$(git diff --name-only --diff-filter=ACMR "$base"...HEAD -- '*.cpp' '*.hpp' || true)"
          if [ -n "$changed_cpp" ]; then
            printf '%s\n' "$changed_cpp" | xargs clang-format --dry-run --Werror
          fi
      - name: Dataset registry smoke test
        run: |
          python3 scripts/download_dataset.py --list
          python3 -m py_compile scripts/download_dataset.py scripts/download_star_catalog.py scripts/convert_star_catalog.py scripts/filter_star_catalog.py scripts/generate_star_tracker_case.py scripts/generate_star_tracker_observations_from_catalog.py scripts/drop_star_ids.py scripts/identify_stars_by_triangles.py scripts/build_star_triangle_index.py scripts/build_star_pair_index.py scripts/identify_stars_with_index.py scripts/identify_stars_with_pair_index.py scripts/apply_star_identifications.py scripts/prepare_polar_traverse.py scripts/evaluate_trajectory.py scripts/plot_trajectory.py scripts/lost_robot_challenge.py benchmarks/run_hyg_ambiguity_benchmark.py benchmarks/run_hyg_pair_index_benchmark.py benchmarks/run_hyg_pair_index_robustness.py benchmarks/run_hyg_pair_index_observation_scaling.py benchmarks/run_hyg_pair_index_false_scaling.py benchmarks/run_lost_in_space_benchmark.py benchmarks/run_lost_in_space_robustness.py benchmarks/run_star_tracker_benchmark.py benchmarks/run_visual_odometry_benchmark.py benchmarks/run_polar_traverse_suite.py benchmarks/summarize_exposure_sweep.py
